stages:
  - docker_build
  - deploy

# Job para compilar el proyecto y generar el JAR
build:
  stage: build
  image: node:20 # Imagen de Node.js para compilar el proyecto
  tags:
    - UPC
  script:
      - node --version
      - npm --version
      - npm cache clean --force
      - rm -rf node_modules package-lock.json
      - npm install
      - npm list @vue/cli-service --depth=0
      - NODE_ENV=production npm run build

  artifacts:
    paths:
      - dist/  # Guarda la carpeta dist como artefacto para las etapas posteriores
  only:
    - main  # Solo corre el job en la rama "main"

# Job para construir la imagen Docker con Docker Compose y publicarla en registry.upc.edu (Harbor)
docker_build:
  stage: docker_build
  tags:
    - UPC
  image: docker:latest  # Usa la imagen Docker oficial
  services:
    - docker:dind  # Docker en Docker para poder ejecutar Docker Compose
  script:
    # Inicia sesión en el registro de imágenes Docker
    - echo $REGISTRY_HARBOR_CLI_SECRET | docker login registry.upc.edu/sddstic-sbpa -u francisco.manez --password-stdin
    #- docker rmi registry.upc.edu/sddstic-sbpa/aprenfrontend:latest
    # Usa Docker Compose para construir la imagen
    - docker-compose build --no-cache doiboardfrontend
    # Empuja la imagen al repositorio usando Docker Compose
    - docker-compose push doiboardfrontend
  only:
    - main

# Job para desplegar la aplicación en el servidor remoto
deploy:
  stage: deploy
  tags:
    - UPC
  image: alpine:latest  # Imagen ligera de Alpine para ejecutar comandos SSH
  script:
    - apk add --no-cache curl
    - curl ifconfig.me
    - apk add --no-cache openssh-client  # Instalar cliente SSH en la imagen Alpine
    - echo "== Verificando conectividad con ping =="
    - ping -c 4 idp.upc.edu  # Verificar si el servidor responde
    - echo "== Mostrar IP pública del runner =="
    - curl ifconfig.me  # Obtener la IP pública del runner para verificar si está permitida
    - echo "== Configurando SSH =="
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo "== Intentando ssh-keyscan =="
    - ssh-keyscan idp.upc.edu || echo "ssh-keyscan failed"  # Intentar ssh-keyscan y manejar errores
    - echo "== Verificar contenido de ~/.ssh/id_rsa =="
    - cat ~/.ssh/id_rsa  # Verificar que la clave privada se haya configurado correctamente
    - echo "== Probar conexión SSH manualmente =="
    - ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "echo 'Conexión SSH exitosa'" || echo "Conexión SSH fallida"
    - ssh-keyscan $SSH_HOST >> ~/.ssh/known_hosts  # Añadir el servidor a "known_hosts"
    - ssh $SSH_USER@$SSH_HOST "cd /SAN/docker-deploy/doiboard/frontend && docker compose down && docker compose pull && docker compose build --no-cache && docker compose up -d"
  only:
    - main
